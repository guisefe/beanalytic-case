name: Pipeline Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instala dependências
        run: |
          pip install pandas pyarrow requests pytest

      - name: Roda os testes
        run: pytest tests/ -v
